name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - run: cd backend && mvn clean package

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: cd frontend && npm install && npm run build